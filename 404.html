<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>404 — Page Not Found</title>
  <link rel="stylesheet" href="/_next/static/css/styles.css">
  <style>
    .error-page { display:flex; flex-direction:column; align-items:center; justify-content:center; min-height:100vh; text-align:center; gap:1rem; }
    .error-code { font-size:8rem; font-weight:800; color:rgba(99,102,241,0.15); line-height:1; }
    .error-page h1 { font-size:1.5rem; margin:0; }
    .error-page p { color:var(--text-muted); max-width:400px; }
    .back-btn { display:inline-flex; align-items:center; gap:.5rem; background:var(--accent); color:white; padding:.6rem 1.25rem; border-radius:8px; text-decoration:none; font-weight:500; font-size:.9rem; margin-top:.5rem; transition:opacity .2s; }
    .back-btn:hover { opacity:.85; text-decoration:none; }
  </style>
</head>
<body>
  <div class="error-page">
    <div class="error-code">404</div>
    <h1>Page not found</h1>
    <p>The page you're looking for doesn't exist yet. This docs site is still being built out.</p>
    <a href="/" class="back-btn">← Back to Docs Home</a>
  </div>
</body>
</html>
